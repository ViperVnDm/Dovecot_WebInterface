{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Page header -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <h1 class="text-2xl font-bold text-gray-900">Alert Configuration</h1>
        <button onclick="document.getElementById('create-alert-modal').classList.remove('hidden')"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors
                       flex items-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
            </svg>
            Add Alert Rule
        </button>
    </div>

    <!-- Settings -->
    <div class="bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900">Checker Settings</h2>
        </div>
        <div id="alerts-settings"
             class="px-6 py-4"
             hx-get="/api/alerts/settings"
             hx-trigger="load"
             hx-swap="innerHTML">
            <p class="text-gray-500 text-sm">Loading...</p>
        </div>
    </div>

    <!-- Active alerts -->
    <div class="bg-white rounded-lg shadow"
         id="active-alerts"
         hx-get="/partials/alerts/active"
         hx-trigger="load, every 30s"
         hx-swap="innerHTML">
        <div class="px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900">Active Alerts</h2>
        </div>
        <div class="p-6">
            <p class="text-gray-500 text-center py-4">Loading alerts...</p>
        </div>
    </div>

    <!-- Alert rules -->
    <div class="bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900">Alert Rules</h2>
        </div>
        <div id="alert-rules"
             hx-get="/partials/alerts/rules"
             hx-trigger="load"
             hx-swap="innerHTML">
            <div class="p-6">
                <p class="text-gray-500 text-center py-4">Loading rules...</p>
            </div>
        </div>
    </div>

    <!-- Alert history -->
    <div class="bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900">Alert History</h2>
        </div>
        <div id="alert-history"
             hx-get="/partials/alerts/history"
             hx-trigger="load"
             hx-swap="innerHTML">
            <div class="p-6">
                <p class="text-gray-500 text-center py-4">Loading history...</p>
            </div>
        </div>
    </div>
</div>

<!-- Create Alert Modal -->
<div id="create-alert-modal"
     class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4"
     @keydown.escape.window="document.getElementById('create-alert-modal').classList.add('hidden')">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full"
         @click.stop>
        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-lg font-semibold text-gray-900">Create Alert Rule</h3>
            <button onclick="document.getElementById('create-alert-modal').classList.add('hidden')"
                    class="text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <form hx-post="/api/alerts/rules"
              hx-target="#alert-rules"
              hx-on::after-request="if(event.detail.successful) { document.getElementById('create-alert-modal').classList.add('hidden'); this.reset(); }"
              class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Rule Name</label>
                <input type="text"
                       name="name"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg
                              focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="e.g., Low disk space warning">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Alert Type</label>
                <select name="rule_type"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg
                               focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="storage">Storage Usage (%)</option>
                    <option value="queue_size">Queue Size (messages)</option>
                    <option value="deferred_count">Deferred Messages</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Condition</label>
                    <select name="threshold_operator"
                            required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg
                                   focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="gt">Greater than</option>
                        <option value="gte">Greater or equal</option>
                        <option value="lt">Less than</option>
                        <option value="lte">Less or equal</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Threshold</label>
                    <input type="number"
                           name="threshold_value"
                           required
                           min="0"
                           step="0.1"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg
                                  focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Notification Method</label>
                <select name="notification_type"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg
                               focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="email">Email</option>
                    <option value="webhook">Webhook</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Notification Target</label>
                <input type="text"
                       name="notification_target"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg
                              focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="admin@example.com or https://webhook.url">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Cooldown (minutes)</label>
                <input type="number"
                       name="cooldown_minutes"
                       value="60"
                       min="5"
                       max="1440"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg
                              focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                <p class="text-sm text-gray-500 mt-1">Minimum time between repeated alerts</p>
            </div>
            <div class="flex justify-end gap-3 pt-4">
                <button type="button"
                        onclick="document.getElementById('create-alert-modal').classList.add('hidden')"
                        class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                    Cancel
                </button>
                <button type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    Create Rule
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
