{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Page header -->
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-900">Storage Monitoring</h1>
        <button hx-get="/partials/storage/overview"
                hx-target="#storage-overview"
                class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors">
            <svg class="w-5 h-5 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Refresh
        </button>
    </div>

    <!-- Storage overview -->
    <div id="storage-overview"
         hx-get="/partials/storage/overview"
         hx-trigger="load, every 60s"
         hx-swap="innerHTML">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Main disk usage -->
            <div class="bg-white rounded-lg shadow p-6 animate-pulse">
                <div class="h-6 bg-gray-200 rounded w-1/3 mb-4"></div>
                <div class="h-4 bg-gray-200 rounded w-full mb-2"></div>
                <div class="h-2 bg-gray-200 rounded w-full mb-4"></div>
                <div class="h-4 bg-gray-200 rounded w-2/3"></div>
            </div>

            <!-- Alert status -->
            <div class="bg-white rounded-lg shadow p-6 animate-pulse">
                <div class="h-6 bg-gray-200 rounded w-1/3 mb-4"></div>
                <div class="h-4 bg-gray-200 rounded w-full mb-2"></div>
                <div class="h-4 bg-gray-200 rounded w-3/4"></div>
            </div>
        </div>
    </div>

    <!-- Mailbox sizes -->
    <div class="bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
            <h2 class="text-lg font-semibold text-gray-900">Mailbox Sizes</h2>
            <div class="text-sm text-gray-500">
                Top mailboxes by size
            </div>
        </div>
        <div id="mailbox-sizes"
             hx-get="/partials/storage/mailboxes"
             hx-trigger="load, every 300s"
             hx-swap="innerHTML">
            <div class="p-6 animate-pulse space-y-4">
                <div class="flex justify-between items-center">
                    <div class="h-4 bg-gray-200 rounded w-1/4"></div>
                    <div class="h-4 bg-gray-200 rounded w-1/6"></div>
                </div>
                <div class="flex justify-between items-center">
                    <div class="h-4 bg-gray-200 rounded w-1/3"></div>
                    <div class="h-4 bg-gray-200 rounded w-1/6"></div>
                </div>
                <div class="flex justify-between items-center">
                    <div class="h-4 bg-gray-200 rounded w-1/4"></div>
                    <div class="h-4 bg-gray-200 rounded w-1/6"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Usage history chart placeholder -->
    <div class="bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200">
            <h2 class="text-lg font-semibold text-gray-900">Usage History (30 Days)</h2>
        </div>
        <div class="p-6"
             id="usage-chart"
             hx-get="/partials/storage/history"
             hx-trigger="load"
             hx-swap="innerHTML">
            <div class="h-64 flex items-center justify-center text-gray-400">
                <div class="text-center">
                    <svg class="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    Loading chart...
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
