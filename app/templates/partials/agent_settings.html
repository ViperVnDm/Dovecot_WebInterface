{% if saved %}
<div class="mb-4 px-3 py-2 bg-green-50 border border-green-200 rounded text-sm text-green-700">
    Settings saved.
</div>
{% endif %}
<form hx-post="/api/agent/settings"
      hx-target="#agent-settings"
      hx-swap="innerHTML"
      class="space-y-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <label class="flex items-center gap-2">
            <input type="checkbox"
                   name="enabled"
                   value="true"
                   {% if cfg.enabled %}checked{% endif %}
                   class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
            <span class="text-sm font-medium text-gray-700">Agent enabled</span>
        </label>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Interval (minutes)</label>
            <input type="number"
                   name="interval_min"
                   value="{{ cfg.interval_min }}"
                   min="1"
                   max="1440"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg
                          focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
    </div>
    <div class="text-sm text-gray-600">
        Today's cost: <span class="font-mono">${{ "%.4f"|format(cfg.today_cost_usd) }}</span>
        {% if cfg.today_cost_date %}<span class="text-gray-400">({{ cfg.today_cost_date }})</span>{% endif %}
    </div>
    <div class="flex justify-end">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
            Save
        </button>
    </div>
</form>
