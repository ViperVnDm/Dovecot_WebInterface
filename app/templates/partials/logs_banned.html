<!-- Banned IPs list -->
{% if banned_ips %}
<div class="flex flex-wrap gap-2">
    {% for ip in banned_ips %}
    <div class="flex items-center gap-1 bg-red-50 border border-red-200 rounded px-3 py-1">
        <span class="font-mono text-sm text-red-800">{{ ip }}</span>
        <button hx-delete="/api/logs/ban-ip/{{ ip }}"
                hx-target="#banned-ips-list"
                hx-swap="innerHTML"
                hx-confirm="Unban {{ ip }}?"
                title="Unban {{ ip }}"
                class="ml-1 text-red-400 hover:text-red-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-sm text-gray-500">No IPs are currently banned.</p>
{% endif %}
