<!-- Active alerts -->
<div class="px-6 py-4 border-b border-gray-200">
    <h2 class="text-lg font-semibold text-gray-900">Active Alerts</h2>
</div>
{% if alerts %}
<div class="divide-y divide-gray-200">
    {% for alert in alerts %}
    <div class="px-6 py-4 flex items-start bg-red-50">
        <div class="flex-shrink-0">
            <span class="w-3 h-3 rounded-full bg-red-500 inline-block animate-pulse"></span>
        </div>
        <div class="ml-3 flex-1">
            <p class="font-medium text-red-700">{{ alert.rule_name }}</p>
            <p class="text-sm text-red-600">{{ alert.message }}</p>
            <p class="text-xs text-red-500 mt-1">
                Current: {{ alert.current_value }} | Threshold: {{ alert.threshold_value }}
            </p>
        </div>
        <div class="text-xs text-red-500">
            {{ alert.triggered_at }}
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="p-8 text-center text-green-600">
    <svg class="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <p class="font-medium">No active alerts</p>
    <p class="text-sm text-gray-500">All systems are operating normally</p>
</div>
{% endif %}
