<!-- Alert settings -->
{% if saved %}
<div class="mb-3 px-3 py-2 bg-green-50 border border-green-200 rounded text-sm text-green-700">
    Settings saved.
</div>
{% endif %}
<form hx-post="/api/alerts/settings"
      hx-target="#alerts-settings"
      hx-swap="innerHTML"
      class="flex items-end gap-4">
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
            Check Interval (minutes)
        </label>
        <input type="number"
               name="check_interval"
               value="{{ check_interval }}"
               min="1"
               max="1440"
               class="w-32 px-3 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        <p class="text-xs text-gray-500 mt-1">How often to evaluate rules (1–1440 min)</p>
    </div>
    <button type="submit"
            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
        Save
    </button>
</form>
