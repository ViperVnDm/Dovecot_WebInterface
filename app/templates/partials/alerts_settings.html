<!-- Alert settings -->
{% if saved %}
<div class="mb-4 px-3 py-2 bg-green-50 border border-green-200 rounded text-sm text-green-700">
    Settings saved.
</div>
{% endif %}
<form hx-post="/api/alerts/settings"
      hx-target="#alerts-settings"
      hx-swap="innerHTML"
      class="space-y-6">

    <!-- Check interval -->
    <div>
        <h3 class="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3">Checker</h3>
        <div class="max-w-xs">
            <label class="block text-sm font-medium text-gray-700 mb-1">Check Interval (minutes)</label>
            <input type="number"
                   name="check_interval"
                   value="{{ check_interval }}"
                   min="1"
                   max="1440"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg
                          focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            <p class="text-xs text-gray-500 mt-1">How often alert rules are evaluated (1–1440 min)</p>
        </div>
    </div>

    <hr class="border-gray-200">

    <!-- SMTP settings -->
    <div>
        <h3 class="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3">Email (SMTP)</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">From Address</label>
                <input type="email"
                       name="smtp_from"
                       value="{{ smtp_from }}"
                       placeholder="alerts@yourdomain.com"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg
                              focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                <p class="text-xs text-gray-500 mt-1">Must match a domain with valid SPF/DKIM</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">SMTP Host</label>
                <input type="text"
                       name="smtp_host"
                       value="{{ smtp_host }}"
                       placeholder="localhost"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg
                              focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">SMTP Port</label>
                <input type="number"
                       name="smtp_port"
                       value="{{ smtp_port }}"
                       min="1"
                       max="65535"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg
                              focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>
    </div>

    <div class="flex justify-end">
        <button type="submit"
                class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
            Save Settings
        </button>
    </div>
</form>
