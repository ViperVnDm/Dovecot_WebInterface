<!-- Recent mail activity for dashboard -->
{% if logs %}
<div class="divide-y divide-gray-200">
    {% for log in logs %}
    <div class="px-6 py-3 flex items-start">
        <div class="flex-shrink-0 mt-1">
            {% if log.level == 'error' %}
            <span class="w-2 h-2 rounded-full bg-red-500 inline-block"></span>
            {% elif log.level == 'warning' %}
            <span class="w-2 h-2 rounded-full bg-yellow-500 inline-block"></span>
            {% else %}
            <span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>
            {% endif %}
        </div>
        <div class="ml-3 flex-1 min-w-0">
            <p class="text-sm text-gray-900 truncate">{{ log.message }}</p>
            <p class="text-xs text-gray-500">
                <span class="font-medium">{{ log.service }}</span>
                <span class="mx-1">&#8226;</span>
                {{ log.timestamp }}
            </p>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="px-6 py-8 text-center text-gray-500">
    <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    <p>No recent activity</p>
</div>
{% endif %}
