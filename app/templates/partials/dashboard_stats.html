<!-- Dashboard statistics cards -->
<div class="bg-white rounded-lg shadow p-6">
    <div class="flex items-center">
        <div class="p-3 bg-blue-100 rounded-full">
            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
        </div>
        <div class="ml-4">
            <p class="text-sm font-medium text-gray-500">Mail Users</p>
            <p class="text-2xl font-semibold text-gray-900">{{ user_count }}</p>
        </div>
    </div>
</div>

<div class="bg-white rounded-lg shadow p-6">
    <div class="flex items-center">
        <div class="p-3 bg-green-100 rounded-full">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <div class="ml-4">
            <p class="text-sm font-medium text-gray-500">Queue Total</p>
            <p class="text-2xl font-semibold text-gray-900">{{ queue_total }}</p>
        </div>
    </div>
</div>

<div class="bg-white rounded-lg shadow p-6">
    <div class="flex items-center">
        <div class="p-3 {% if deferred > 0 %}bg-yellow-100{% else %}bg-gray-100{% endif %} rounded-full">
            <svg class="w-6 h-6 {% if deferred > 0 %}text-yellow-600{% else %}text-gray-600{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <div class="ml-4">
            <p class="text-sm font-medium text-gray-500">Deferred</p>
            <p class="text-2xl font-semibold text-gray-900">{{ deferred }}</p>
        </div>
    </div>
</div>

<div class="bg-white rounded-lg shadow p-6">
    <div class="flex items-center">
        <div class="p-3 {% if storage_percent > 90 %}bg-red-100{% elif storage_percent > 75 %}bg-yellow-100{% else %}bg-green-100{% endif %} rounded-full">
            <svg class="w-6 h-6 {% if storage_percent > 90 %}text-red-600{% elif storage_percent > 75 %}text-yellow-600{% else %}text-green-600{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
            </svg>
        </div>
        <div class="ml-4">
            <p class="text-sm font-medium text-gray-500">Storage</p>
            <p class="text-2xl font-semibold text-gray-900">{{ storage_percent }}%</p>
        </div>
    </div>
</div>
