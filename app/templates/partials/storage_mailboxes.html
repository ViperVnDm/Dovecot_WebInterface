<!-- Mailbox sizes list -->
{% if mailboxes %}
<div class="divide-y divide-gray-200">
    {% for mb in mailboxes %}
    <div class="px-6 py-4 flex justify-between items-center hover:bg-gray-50">
        <div class="flex items-center">
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center mr-3">
                <span class="text-blue-600 font-medium text-sm">{{ mb.username[0]|upper }}</span>
            </div>
            <div>
                <p class="font-medium text-gray-900">{{ mb.username }}</p>
                <p class="text-sm text-gray-500">{{ mb.message_count }} messages</p>
            </div>
        </div>
        <div class="text-right">
            <p class="font-medium text-gray-900">{{ format_bytes(mb.size_bytes) }}</p>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="p-8 text-center text-gray-500">
    <p>No mailbox data available</p>
</div>
{% endif %}
