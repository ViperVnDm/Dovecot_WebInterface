<!-- Log entries list -->
{% if entries %}
{% for entry in entries %}
<div class="py-1 {% if entry.level == 'error' %}text-red-400{% elif entry.level == 'warning' %}text-yellow-400{% else %}text-green-400{% endif %}">
    <span class="text-gray-500">{{ entry.timestamp }}</span>
    <span class="text-blue-400">[{{ entry.service }}{% if entry.pid %}:{{ entry.pid }}{% endif %}]</span>
    {{ entry.message }}
</div>
{% endfor %}
{% else %}
<div class="text-gray-400 text-center py-8">
    No log entries found
</div>
{% endif %}
