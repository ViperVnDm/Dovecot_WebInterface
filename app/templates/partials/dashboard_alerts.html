<!-- Active alerts for dashboard -->
{% if alerts %}
<div class="px-6 py-4 border-b border-gray-200 bg-red-50">
    <h2 class="text-lg font-semibold text-red-700">
        <svg class="w-5 h-5 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        Active Alerts ({{ alerts|length }})
    </h2>
</div>
<div class="divide-y divide-gray-200">
    {% for alert in alerts %}
    <div class="px-6 py-4 flex items-start">
        <div class="flex-shrink-0">
            <span class="w-3 h-3 rounded-full bg-red-500 inline-block animate-pulse"></span>
        </div>
        <div class="ml-3">
            <p class="font-medium text-gray-900">{{ alert.rule_name }}</p>
            <p class="text-sm text-gray-500">{{ alert.message }}</p>
            <p class="text-xs text-gray-400 mt-1">{{ alert.triggered_at }}</p>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<!-- No active alerts - don't show the panel -->
{% endif %}
