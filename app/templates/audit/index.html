{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Page header -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Audit Log</h1>
            <p class="text-sm text-gray-500 mt-1">
                Privileged actions performed through this console (most recent 100).
            </p>
        </div>
        <button hx-get="/partials/audit/entries"
                hx-target="#audit-entries"
                class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors">
            <svg class="w-5 h-5 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Refresh
        </button>
    </div>

    <!-- Entries -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <div id="audit-entries"
             hx-get="/partials/audit/entries"
             hx-trigger="load, every 30s"
             hx-swap="innerHTML">
            <div class="p-6 text-center text-gray-500">
                <div class="animate-spin inline-block w-6 h-6 border-2 border-blue-600 border-t-transparent rounded-full"></div>
                <p class="mt-2">Loading audit log...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
