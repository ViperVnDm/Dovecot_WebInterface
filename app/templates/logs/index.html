{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Page header -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <h1 class="text-2xl font-bold text-gray-900">Logs & Stats</h1>
        <div class="flex gap-2">
            <button onclick="document.getElementById('log-output').scrollTop = document.getElementById('log-output').scrollHeight"
                    class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors">
                Scroll to Bottom
            </button>
            <button hx-get="/partials/logs/entries"
                    hx-target="#log-output"
                    hx-include="[name='level'],[name='service'],[name='search']"
                    class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors">
                <svg class="w-5 h-5 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Refresh
            </button>
        </div>
    </div>

    <!-- Stats cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4"
         hx-get="/partials/logs/stats"
         hx-trigger="load, every 30s"
         hx-swap="innerHTML">
        <div class="bg-white rounded-lg shadow p-4 animate-pulse">
            <div class="h-4 bg-gray-200 rounded w-20 mb-2"></div>
            <div class="h-8 bg-gray-200 rounded w-12"></div>
        </div>
        <div class="bg-white rounded-lg shadow p-4 animate-pulse">
            <div class="h-4 bg-gray-200 rounded w-20 mb-2"></div>
            <div class="h-8 bg-gray-200 rounded w-12"></div>
        </div>
        <div class="bg-white rounded-lg shadow p-4 animate-pulse">
            <div class="h-4 bg-gray-200 rounded w-20 mb-2"></div>
            <div class="h-8 bg-gray-200 rounded w-12"></div>
        </div>
        <div class="bg-white rounded-lg shadow p-4 animate-pulse">
            <div class="h-4 bg-gray-200 rounded w-20 mb-2"></div>
            <div class="h-8 bg-gray-200 rounded w-12"></div>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-lg shadow p-4">
        <div class="flex flex-col sm:flex-row gap-4">
            <select name="level"
                    hx-get="/partials/logs/entries"
                    hx-trigger="change"
                    hx-target="#log-output"
                    hx-include="[name='service'],[name='search']"
                    class="px-4 py-2 border border-gray-300 rounded-lg
                           focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                <option value="">All Levels</option>
                <option value="info">Info</option>
                <option value="warning">Warning</option>
                <option value="error">Error</option>
            </select>
            <select name="service"
                    hx-get="/partials/logs/entries"
                    hx-trigger="change"
                    hx-target="#log-output"
                    hx-include="[name='level'],[name='search']"
                    class="px-4 py-2 border border-gray-300 rounded-lg
                           focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                <option value="">All Services</option>
                <option value="postfix">Postfix</option>
                <option value="dovecot">Dovecot</option>
                <option value="spamd">SpamAssassin</option>
                <option value="webadmin">Web Interface</option>
            </select>
            <input type="text"
                   name="search"
                   placeholder="Search logs..."
                   hx-get="/partials/logs/entries"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#log-output"
                   hx-include="[name='level'],[name='service']"
                   class="flex-1 px-4 py-2 border border-gray-300 rounded-lg
                          focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
    </div>

    <!-- Log output -->
    <div class="bg-gray-900 rounded-lg shadow overflow-hidden">
        <div class="px-4 py-2 bg-gray-800 flex justify-between items-center">
            <span class="text-sm text-gray-400 font-mono">mail.log</span>
            <span class="text-xs text-gray-500">Most recent 100 entries</span>
        </div>
        <div id="log-output"
             class="p-4 font-mono text-sm h-[60vh] overflow-y-auto"
             hx-get="/partials/logs/entries"
             hx-trigger="load, every 10s"
             hx-include="[name='level'],[name='service'],[name='search']"
             hx-swap="innerHTML">
            <div class="text-gray-400 text-center py-8">
                <div class="animate-spin inline-block w-6 h-6 border-2 border-blue-600 border-t-transparent rounded-full"></div>
                <p class="mt-2">Loading logs...</p>
            </div>
        </div>
    </div>

    <!-- Banned IPs -->
    <div class="bg-white rounded-lg shadow">
        <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center">
            <h2 class="text-lg font-semibold text-gray-900">Banned IPs</h2>
            <button hx-get="/partials/logs/banned"
                    hx-target="#banned-ips-list"
                    class="text-sm text-blue-600 hover:text-blue-800">Refresh</button>
        </div>
        <div id="banned-ips-list"
             class="p-4"
             hx-get="/partials/logs/banned"
             hx-trigger="load"
             hx-swap="innerHTML">
            <p class="text-gray-400 text-sm">Loading...</p>
        </div>
    </div>
</div>
{% endblock %}
